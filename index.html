<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Flappy Bird</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --text2: rgba(240,237,232,0.45);
    --accent: #c8f135;
    --radius: 16px;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:var(--bg);
    font-family:Helvetica,Arial,sans-serif; touch-action:none; user-select:none; }
  canvas { display:block; touch-action:none; }

  /* SCORE HUD */
  #hud {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:center;
    padding-top:max(20px,env(safe-area-inset-top));
    pointer-events:none; z-index:10;
    opacity:0; transition:opacity .25s;
  }
  #hud.show { opacity:1; }
  .pill {
    background:rgba(13,13,13,.65);
    border:1px solid var(--border);
    border-radius:100px;
    padding:8px 24px 8px 18px;
    display:flex; align-items:center; gap:12px;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  }
  .pill-score { font-size:34px; font-weight:800; color:var(--text);
    letter-spacing:-1.5px; line-height:1; min-width:28px; text-align:center; }
  .pill-best { display:flex; flex-direction:column; }
  .pill-best-label { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.08em; }
  .pill-best-val { font-size:14px; font-weight:700; color:var(--accent); letter-spacing:-.3px; line-height:1; }

  /* COUNTDOWN */
  #cd {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    z-index:30; pointer-events:none; opacity:0; transition:opacity .2s;
  }
  #cd.show { opacity:1; }
  #cd-num {
    font-size:120px; font-weight:800; color:var(--text);
    letter-spacing:-4px; line-height:1;
    text-shadow:0 0 60px rgba(200,241,53,.35);
  }
  #cd-num.pop { animation:cdpop .35s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes cdpop { from{transform:scale(.35);opacity:0} to{transform:scale(1);opacity:1} }

  /* OVERLAY */
  #ov {
    position:fixed; inset:0; display:flex;
    flex-direction:column; align-items:center; justify-content:center;
    z-index:20; padding:32px; transition:opacity .3s;
  }
  #ov.hide { opacity:0; pointer-events:none; }
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:26px; padding:36px 28px 28px;
    width:100%; max-width:320px; text-align:center;
    animation:cardIn .4s cubic-bezier(.34,1.3,.64,1) forwards;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
  .icon { font-size:54px; display:block; margin-bottom:14px; animation:flt 2.8s ease-in-out infinite; }
  .icon.still { animation:none; }
  @keyframes flt { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  .title { font-size:30px; font-weight:800; color:var(--text); letter-spacing:-1px; margin-bottom:6px; }
  .sub { font-size:13px; color:var(--text2); line-height:1.55; margin-bottom:26px; }
  .srow { display:flex; gap:10px; margin-bottom:22px; }
  .sbox { flex:1; background:rgba(255,255,255,.04); border:1px solid var(--border);
    border-radius:14px; padding:14px 8px; }
  .sbox-lbl { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.1em; margin-bottom:5px; }
  .sbox-val { font-size:28px; font-weight:800; color:var(--text); letter-spacing:-1px; line-height:1; }
  .sbox-val.acc { color:var(--accent); }
  .rec-badge {
    display:inline-block; background:var(--accent); color:#0d0d0d;
    font-size:10px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
    padding:3px 10px; border-radius:100px; margin-bottom:16px;
    opacity:0; transform:scale(.7); transition:opacity .3s .35s, transform .3s .35s;
  }
  .rec-badge.show { opacity:1; transform:scale(1); }
  .btn {
    width:100%; padding:17px; background:var(--accent); color:#0d0d0d;
    border:none; border-radius:var(--radius);
    font-family:Helvetica,Arial,sans-serif; font-size:17px; font-weight:800;
    letter-spacing:-.3px; cursor:pointer;
    transition:transform .1s, opacity .1s;
    -webkit-appearance:none; appearance:none;
  }
  .btn + .btn { margin-top:12px; }
  .btn:active { transform:scale(.96); opacity:.85; }

  /* SPEED SELECTOR */
  .speed-row { margin-top:18px; }
  .speed-lbl { display:block; font-size:10px; color:var(--text2); text-transform:uppercase;
    letter-spacing:.1em; margin-bottom:9px; }
  .speed-pills { display:flex; gap:7px; }
  .spill {
    flex:1; padding:9px 4px; background:rgba(255,255,255,.04);
    border:1px solid var(--border); border-radius:10px;
    color:var(--text2); font-family:Helvetica,Arial,sans-serif;
    font-size:12px; font-weight:700; cursor:pointer;
    transition:background .15s, color .15s, border-color .15s;
    -webkit-appearance:none; appearance:none;
  }
  .spill.active {
    background:rgba(200,241,53,.13); border-color:var(--accent);
    color:var(--accent);
  }
  .spill:active { transform:scale(.95); }

  .char-row { margin-top:14px; }
  .char-lbl { display:block; font-size:10px; color:var(--text2); text-transform:uppercase;
    letter-spacing:.1em; margin-bottom:9px; }
  .char-pills { display:flex; gap:7px; }
  .charbtn {
    flex:1; padding:10px 4px; background:rgba(255,255,255,.04);
    border:1px solid var(--border); border-radius:10px;
    color:var(--text2); font-family:Helvetica,Arial,sans-serif;
    font-size:12px; font-weight:700; cursor:pointer;
    transition:background .15s, color .15s, border-color .15s;
    -webkit-appearance:none; appearance:none;
  }
  .charbtn.active { background:rgba(200,241,53,.13); border-color:var(--accent); color:var(--accent); }
  .charbtn:active { transform:scale(.95); }

  /* PARTICLES */
  #pc { position:fixed; inset:0; pointer-events:none; z-index:15; }
</style>
</head>
<body>

<canvas id="gc"></canvas>
<canvas id="pc"></canvas>

<div id="hud">
  <div class="pill">
    <div class="pill-score" id="live">0</div>
    <div class="pill-best">
      <span class="pill-best-label">Récord</span>
      <span class="pill-best-val" id="hud-best">0</span>
    </div>
  </div>
</div>

<div id="cd"><div id="cd-num">3</div></div>

<div id="ov"><div class="card" id="card"></div></div>

<script>
// ── AUDIO ──────────────────────────────────────────────
let AC;
try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
const resumeAC = () => { try{ if(AC&&AC.state==='suspended') AC.resume(); }catch(e){} };

function tone(freq, type, dur, vol, delay=0) {
  if(!AC) return;
  try {
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type;
    const t=AC.currentTime+delay;
    o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur);
  } catch(e){}
}
const sfxFlap  = () => { tone(400,'sine',.1,.13); tone(560,'sine',.06,.07); };
const sfxPoint = () => { tone(620,'triangle',.13,.18); tone(940,'triangle',.13,.15,.09); };
const sfxDie   = () => { tone(280,'sawtooth',.38,.22); };
const sfxBeep  = (f) => { tone(f,'sine',.15,.18); };
const vibe     = (p) => { try{ navigator.vibrate && navigator.vibrate(p); }catch(e){} };

// ── PARTICLES ──────────────────────────────────────────
const pcEl  = document.getElementById('pc');
const pctx  = pcEl.getContext('2d');
const EMOJ  = ['💥','✨','⭐','🔥','💫'];
let parts=[], praf=null;

function boom(x,y) {
  for(let i=0;i<14;i++){
    const a=(Math.PI*2/14)*i+(Math.random()-.5)*.6, s=2.5+Math.random()*5;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      e:EMOJ[~~(Math.random()*EMOJ.length)],
      sz:14+Math.random()*14,life:1,dec:.026+Math.random()*.02});
  }
  if(!praf) tickParts();
}
function tickParts(){
  pctx.clearRect(0,0,W,H);
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.18; p.life-=p.dec;
    pctx.save(); pctx.globalAlpha=Math.max(0,p.life);
    pctx.font=`${p.sz}px serif`; pctx.textAlign='center'; pctx.textBaseline='middle';
    pctx.fillText(p.e,p.x,p.y); pctx.restore();
  });
  praf=parts.length?requestAnimationFrame(tickParts):null;
  if(!parts.length) pctx.clearRect(0,0,W,H);
}

// ── CANVAS ─────────────────────────────────────────────
const gc  = document.getElementById('gc');
const ctx = gc.getContext('2d');
let W,H,DPR;

function resize(){
  DPR=window.devicePixelRatio||1;
  W=window.innerWidth; H=window.innerHeight;
  gc.width=W*DPR; gc.height=H*DPR; gc.style.width=W+'px'; gc.style.height=H+'px';
  ctx.setTransform(1,0,0,1,0,0); ctx.scale(DPR,DPR);
  pcEl.width=W*DPR; pcEl.height=H*DPR; pcEl.style.width=W+'px'; pcEl.style.height=H+'px';
  pctx.setTransform(1,0,0,1,0,0); pctx.scale(DPR,DPR);
}
window.addEventListener('resize', resize);
resize();

// ── GAME CONSTANTS ─────────────────────────────────────
const PLAYERS = {
  green: { hex:'#c8f135', border:'#7aaa00' },
  red:   { hex:'#f14a3a', border:'#a22a1d' },
  blue:  { hex:'#4ab9ff', border:'#1f6fa6' },
  pink:  { hex:'#ff7fc8', border:'#a64b91' },
};
let playerKey = localStorage.getItem('fb_player') || 'green';
let BC = PLAYERS[playerKey];

function GC(){
  const base=Math.min(W,H);
  const safeScore = Math.max(0, score||0);
  const gapReduction = Math.max(0, Math.min(safeScore, 20) - 10) / 10;
  // 40+: tubos más estrechos y más juntos
  const narrowFactor = safeScore >= 40 ? Math.min((safeScore - 40) / 30, 1) : 0;
  const pipeWidth = Math.max(34, base*.13 - narrowFactor * base*.05);
  const pipeInterval = Math.max(1200, 1700 - narrowFactor * 400);
  return {
    G:    H*.0026,
    FLAP: -H*.021,
    BR:   base*.038,
    PW:   pipeWidth,
    GAP:  H*.265 - gapReduction * H*.05 - narrowFactor * H*.04,
    SPD:  W*.0042 * (SPEEDS[speedKey]||1),
    PINT: pipeInterval,
    GRH:  Math.max(48,H*.075),
  };
}

// ── STATE ──────────────────────────────────────────────
// 'start' | 'countdown' | 'playing' | 'dead'
let STATE='start';
let bird,pipes,score,best,animId,lastTs,pipeTimer,cdTimeout,enemies,enemyTimer,bullets;
// ── NEW MECHANICS STATE ────────────────────────────────
let powerups=[], powerupTimer=0;
let windForce=0, windTimer=0, windActive=false;
let shield=false, shieldTimer=0;
let slowActive=false, slowTimer=0;
let doubleJumpReady=false, doubleJumpUsed=false;

best = parseInt(localStorage.getItem('fb')||'0');
document.getElementById('hud-best').textContent=best;

// ── SPEED ──────────────────────────────────────────────
const SPEEDS = { slow: 0.65, normal: 1, fast: 3 };
let speedKey = localStorage.getItem('fb_speed') || 'normal';

function mkBird(){ const c=GC(); return {x:W*.28,y:H*.44,vy:0,r:c.BR,angle:0}; }
function mkPipe(x){ const c=GC(),mn=H*.14,mx=H-c.GRH-c.GAP-H*.14;
  const topH = mn + Math.random()*(mx-mn);
  const isMoving = (score>=20) && Math.random() < 0.5;
  // 70+: pipes also drift horizontally
  const horizDrift = (score>=70) && Math.random() < 0.5;
  return {
    x,
    topH,
    w:c.PW,
    scored:false,
    glow:0,
    isMoving,
    vy: isMoving ? (Math.random() < 0.5 ? 0.16 : -0.16) : 0,
    vxExtra: horizDrift ? (Math.random() < 0.5 ? 0.10 : -0.10) : 0,
    invisible: false, semiTimer: 0,
  };
}
function mkEnemy(){ const c=GC(); return {
  x: W + 90,
  y: H * (0.18 + Math.random() * 0.58),
  vx: -(c.SPD*1.05 + 0.26),
  vy: 0,
  r: c.BR * 0.6,
  phase: Math.random()*Math.PI*2,
  reload: 1400 + Math.random()*800,
  cooldown: 0,
}; }

function mkBullet(e){ return {
  x: e.x - e.r - 12,
  y: e.y,
  vx: -(e.vx * 1.2 + 0.8),
  vy: 0,
  r: 7,
}; }

// ── POWER-UPS ──────────────────────────────────────────
const PU_TYPES = ['shield','doublejump','slow'];
function mkPowerup(){
  const c=GC();
  const type = PU_TYPES[~~(Math.random()*PU_TYPES.length)];
  return {
    x: W+40, y: H*(0.2+Math.random()*0.55),
    r: c.BR*0.85, type, phase:0,
    vx: -(c.SPD*0.9),
  };
}
const PU_COLOR = { shield:'#4ab9ff', doublejump:'#c8f135', slow:'#ff7fc8' };
const PU_ICON  = { shield:'🛡', doublejump:'⚡', slow:'🐢' };
function drawPowerup(pu){
  ctx.save();
  ctx.translate(pu.x, pu.y + Math.sin(pu.phase)*4);
  ctx.shadowColor=PU_COLOR[pu.type]; ctx.shadowBlur=18;
  ctx.beginPath(); ctx.arc(0,0,pu.r,0,Math.PI*2);
  ctx.fillStyle='rgba(13,13,13,.82)'; ctx.fill();
  ctx.strokeStyle=PU_COLOR[pu.type]; ctx.lineWidth=2.5; ctx.stroke();
  ctx.shadowBlur=0;
  ctx.font=`${pu.r*1.1}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(PU_ICON[pu.type],0,1);
  ctx.restore();
}
function activatePowerup(type){
  if(type==='shield'){ shield=true; shieldTimer=4500; sfxBeep(700); vibe(30); }
  if(type==='doublejump'){ doubleJumpReady=true; doubleJumpUsed=false; sfxBeep(880); vibe(20); }
  if(type==='slow'){ slowActive=true; slowTimer=4000; sfxBeep(440); vibe(20); }
  boom(bird.x, bird.y);
}
// SFX for wind
const sfxWind = () => { tone(160,'sawtooth',.6,.07); };


function drawBullet(b){ ctx.save(); ctx.translate(b.x,b.y);
  ctx.shadowColor='rgba(255,150,80,.25)'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fillStyle='#ffb367'; ctx.fill();
  ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.strokeStyle='rgba(255,180,100,.85)'; ctx.lineWidth=2; ctx.stroke();
  ctx.restore(); }

// ── INPUT: only active during 'playing' ────────────────
function doFlap(){
  if(STATE!=='playing') return;
  resumeAC();
  const c=GC();
  // Normal flap: reset double jump tracking
  if(bird.vy >= 0 || !doubleJumpReady) {
    bird.vy = c.FLAP;
    if(doubleJumpReady) doubleJumpUsed=false; // reset on landing impulse
  } else if(doubleJumpReady && !doubleJumpUsed){
    // mid-air second jump
    bird.vy = c.FLAP * 0.85;
    doubleJumpUsed=true; doubleJumpReady=false;
    tone(880,'sine',.1,.2); tone(1100,'sine',.08,.15,.07);
    vibe([10,10,20]); return;
  } else {
    bird.vy = c.FLAP;
  }
  sfxFlap(); vibe(12);
}

document.addEventListener('keydown', e=>{
  if(e.code==='Space'){
    e.preventDefault(); // evita scroll del browser
    doFlap();
  }
});

// Single touchstart listener — only flaps when playing
document.addEventListener('touchstart', e=>{
  // Only flap if NOT a button/link — let those handle their own events
  const tag = e.target.tagName.toLowerCase();
  if(tag==='button'||tag==='a') return;
  // Prevent default only for canvas/game taps (stop scroll/zoom)
  e.preventDefault();
  doFlap();
}, { passive:false });

// Ensure buttons work reliably on mobile via touchend
document.addEventListener('touchend', e=>{
  const tag = e.target.tagName.toLowerCase();
  if(tag==='button') { e.preventDefault(); e.target.click(); }
}, { passive:false });

gc.addEventListener('mousedown', doFlap);

// ── DRAW ───────────────────────────────────────────────
function drawBg(){
  ctx.strokeStyle='rgba(255,255,255,.016)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=44){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<H;y+=44){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
}

function drawGround(){
  const c=GC(), gY=H-c.GRH;
  ctx.fillStyle='#161616'; ctx.fillRect(0,gY,W,c.GRH);
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,gY); ctx.lineTo(W,gY); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.032)';
  for(let x=0;x<W;x+=22){ ctx.beginPath();ctx.moveTo(x,gY);ctx.lineTo(x,gY+6);ctx.stroke(); }
}

function drawBird(b){
  ctx.save(); ctx.translate(b.x,b.y);
  const tgt=Math.min(Math.max((b.vy||0)*.06,-.45),1.1);
  b.angle=(b.angle||0)+(tgt-(b.angle||0))*.18;
  ctx.rotate(b.angle);
  // shield ring
  if(shield){
    ctx.beginPath(); ctx.arc(0,0,b.r*1.55,0,Math.PI*2);
    ctx.strokeStyle='rgba(74,185,255,0.7)'; ctx.lineWidth=3;
    ctx.shadowColor='#4ab9ff'; ctx.shadowBlur=14; ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.shadowColor=BC.hex; ctx.shadowBlur=16;
  ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fillStyle=BC.hex; ctx.fill();
  ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2);
  ctx.strokeStyle=BC.border; ctx.lineWidth=2.5; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-b.r*.15,b.r*.22,b.r*.42,b.r*.21,-.3,0,Math.PI*2);
  ctx.fillStyle=BC.border; ctx.fill();
  const ex=b.r*.38,ey=-b.r*.2;
  ctx.beginPath(); ctx.arc(ex,ey,b.r*.18,0,Math.PI*2); ctx.fillStyle='#0d0d0d'; ctx.fill();
  ctx.beginPath(); ctx.arc(ex+b.r*.06,ey-b.r*.06,b.r*.07,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fill();
  ctx.restore();
}

function drawEnemy(e){
  ctx.save(); ctx.translate(e.x,e.y);
  ctx.rotate(Math.sin(e.phase) * 0.14);
  ctx.shadowColor='rgba(255,80,80,.3)'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2); ctx.fillStyle='#ff4c4c'; ctx.fill();
  ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2);
  ctx.strokeStyle='rgba(180,40,40,.9)'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-e.r*.15,e.r*.22,e.r*.42,e.r*.21,-.3,0,Math.PI*2);
  ctx.fillStyle='rgba(180,60,60,.95)'; ctx.fill();
  const ex=e.r*.32, ey=-e.r*.2;
  ctx.beginPath(); ctx.arc(ex,ey,e.r*.18,0,Math.PI*2); ctx.fillStyle='#0d0d0d'; ctx.fill();
  ctx.beginPath(); ctx.arc(ex+e.r*.05,ey-e.r*.05,e.r*.06,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fill();
  ctx.restore();
}

function rrect(x,y,w,h,tl,tr,br,bl){
  ctx.beginPath();
  ctx.moveTo(x+tl,y); ctx.lineTo(x+w-tr,y); ctx.quadraticCurveTo(x+w,y,x+w,y+tr);
  ctx.lineTo(x+w,y+h-br); ctx.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
  ctx.lineTo(x+bl,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-bl);
  ctx.lineTo(x,y+tl); ctx.quadraticCurveTo(x,y,x+tl,y); ctx.closePath();
}

function drawPipe(p){
  const c=GC(),r=10,ge=p.topH+c.GAP;
  // 50+: semi/invisible pipes
  let pipeAlpha = 1;
  if(score>=50){
    if(p.invisible){ pipeAlpha = 0.08; }
    else if(score>=50){ pipeAlpha = Math.max(0.18, 1 - ((score-50)/30)*0.55); }
  }
  ctx.save(); ctx.globalAlpha=pipeAlpha;
  if(p.glow>0){ ctx.shadowColor=BC.hex; ctx.shadowBlur=22*p.glow; }
  ctx.fillStyle='#2d6016'; ctx.strokeStyle='rgba(50,110,26,.9)'; ctx.lineWidth=1.5;
  rrect(p.x,0,p.w,p.topH-r,0,0,r,r); ctx.fill(); ctx.stroke();
  rrect(p.x,ge+r,p.w,H-ge-r-c.GRH,r,r,0,0); ctx.fill(); ctx.stroke();
  ctx.shadowBlur=0;
  const cx=p.x-5,cw=p.w+10;
  ctx.fillStyle='#285212'; ctx.strokeStyle='rgba(50,110,26,.7)';
  rrect(cx,p.topH-18,cw,18,0,0,6,6); ctx.fill(); ctx.stroke();
  rrect(cx,ge,cw,18,6,6,0,0); ctx.fill(); ctx.stroke();
  ctx.setLineDash([4,9]);
  ctx.strokeStyle=p.glow>0?`rgba(200,241,53,${.2*p.glow})`:'rgba(255,255,255,.022)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(p.x+p.w/2,p.topH+5); ctx.lineTo(p.x+p.w/2,ge-5); ctx.stroke();
  ctx.setLineDash([]);
  if(p.glow>0) p.glow=Math.max(0,p.glow-.055);
  ctx.restore();
}

// ── IDLE LOOP ──────────────────────────────────────────
function idleLoop(ts){
  if(STATE!=='start') return;
  ctx.clearRect(0,0,W,H); drawBg();
  const fb={x:W*.28,y:H*.43+Math.sin(ts/600)*11,vy:Math.sin(ts/600)*2.5,angle:0,r:GC().BR};
  drawGround(); drawBird(fb);
  requestAnimationFrame(idleLoop);
}

// ── COUNTDOWN LOOP ─────────────────────────────────────
function cdLoop(ts){
  if(STATE!=='countdown'&&STATE!=='playing') return;
  ctx.clearRect(0,0,W,H); drawBg();
  // Float bird while counting
  if(STATE==='countdown'){
    bird.y=H*.43+Math.sin(ts/600)*11;
    bird.vy=Math.sin(ts/600)*2.5;
  }
  drawGround(); drawBird(bird);
  if(STATE==='countdown') animId=requestAnimationFrame(cdLoop);
}

// ── GAME LOOP ──────────────────────────────────────────
function gameLoop(ts){
  if(!lastTs) lastTs=ts;
  const rawDt=Math.min(ts-lastTs,50); lastTs=ts;
  // 50+ slow power-up: halve game speed
  const dt = slowActive ? rawDt * 0.5 : rawDt;
  const c=GC();

  ctx.clearRect(0,0,W,H); drawBg();

  // ── WIND (60+) ─────────────────────────────────────
  if(score>=60){
    windTimer-=rawDt;
    if(windTimer<=0){
      windActive=!windActive;
      windTimer = windActive ? 2500+Math.random()*2000 : 2000+Math.random()*1500;
      if(windActive){ windForce=(Math.random()<.5?1:-1)*(H*.00045+Math.random()*H*.0003); sfxWind(); }
      else windForce=0;
    }
    // Draw wind indicator
    if(windActive){
      const dir=windForce>0?1:-1;
      ctx.save(); ctx.globalAlpha=0.18+Math.sin(ts/200)*0.06;
      ctx.fillStyle=windForce>0?'#4ab9ff':'#ff7fc8';
      for(let i=0;i<6;i++){
        const wy=H*(.25+i*.09), wx=dir>0?W*.08:W*.92;
        ctx.font='18px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(dir>0?'→':'←', wx, wy);
      }
      ctx.restore();
    }
  }

  // ── SLOW POWER-UP TIMER ─────────────────────────────
  if(slowActive){ slowTimer-=rawDt; if(slowTimer<=0){ slowActive=false; slowTimer=0; } }

  // ── SHIELD TIMER ───────────────────────────────────
  if(shield){ shieldTimer-=rawDt; if(shieldTimer<=0){ shield=false; shieldTimer=0; } }

  // ── PIPES ──────────────────────────────────────────
  pipeTimer+=dt;
  if(pipeTimer>=c.PINT){
    const np=mkPipe(W+c.PW);
    // 50+: mark some pipes as invisible/semi
    if(score>=50 && Math.random()<0.35) np.invisible=true;
    pipes.push(np);
    pipeTimer=0;
  }

  pipes.forEach(p=>{
    if(p.isMoving){
      const minTop = H*.14;
      const maxTop = H - c.GRH - c.GAP - H*.14;
      p.topH += p.vy * (dt/16);
      if(p.topH < minTop){ p.topH = minTop; p.vy = Math.abs(p.vy); }
      if(p.topH > maxTop){ p.topH = maxTop; p.vy = -Math.abs(p.vy); }
    }
    // 70+: horizontal drift (pipes also drift against movement)
    if(p.vxExtra){
      p.x += p.vxExtra * (dt/16);
      // reverse if drifted too far left or right relative to its natural position
      if(p.x < W*0.05 || p.x > W*0.9){ p.vxExtra *= -1; }
    }
    p.x-=c.SPD*(dt/16);
    if(!p.scored&&p.x+p.w<bird.x){
      p.scored=true; p.glow=1; score++;
      sfxPoint(); vibe(25);
      document.getElementById('live').textContent=score;
      if(score>best){ best=score; localStorage.setItem('fb',best);
        document.getElementById('hud-best').textContent=best; }
    }
    drawPipe(p);
  });
  pipes=pipes.filter(p=>p.x+p.w>-20);

  // ── ENEMIES (30+ more frequent & targeted at 80+) ─
  enemyTimer += dt;
  const enemySpawn = score>=80 ? 2000 : 2800;
  if(score>=30 && enemyTimer>=enemySpawn){ enemies.push(mkEnemy()); enemyTimer=0; }
  enemies.forEach(e=>{
    e.x += e.vx * (dt/16);
    // 80+: stronger homing
    const homingStrength = score>=80 ? 0.09 : 0.04;
    if(score>=30){
      const targetY = bird.y;
      e.vy += Math.sign(targetY - e.y) * homingStrength;
      e.vy = Math.max(Math.min(e.vy, score>=80?1.5:0.9), score>=80?-1.5:-0.9);
    }
    e.y += e.vy * (dt/16);
    e.phase += 0.08;
    e.cooldown -= dt;
    // 80+: more frequent shots
    const reloadTime = score>=80 ? Math.max(600, e.reload*0.6) : e.reload;
    if(e.cooldown <= 0){
      const b=mkBullet(e);
      // 80+: aimed shot toward bird
      if(score>=80){
        const dx=bird.x-e.x, dy=bird.y-e.y, dist=Math.hypot(dx,dy)||1;
        const spd=Math.abs(b.vx);
        b.vx = (dx/dist)*spd*1.1;
        b.vy = (dy/dist)*spd*0.7;
      }
      bullets.push(b);
      e.cooldown = reloadTime;
    }
    drawEnemy(e);
  });
  enemies = enemies.filter(e=>e.x+e.r>-50 && e.y>e.r && e.y<H-c.GRH-e.r);

  bullets.forEach(b=>{
    b.x += b.vx * (dt/16);
    b.y += b.vy * (dt/16);
    drawBullet(b);
  });
  bullets = bullets.filter(b=>b.x+b.r>0 && b.y>b.r && b.y<H-c.GRH-b.r);

  // ── POWER-UPS ──────────────────────────────────────
  powerupTimer-=rawDt;
  if(powerupTimer<=0){
    // Rare: ~8s avg interval, only after score 5
    powerupTimer = 6000 + Math.random()*6000;
    if(score>=5 && Math.random()<0.55) powerups.push(mkPowerup());
  }
  powerups.forEach(pu=>{ pu.x+=pu.vx*(dt/16); pu.phase+=0.06; drawPowerup(pu); });
  // Collect powerups
  powerups=powerups.filter(pu=>{
    const dx=bird.x-pu.x, dy=bird.y-pu.y;
    if(Math.hypot(dx,dy)<bird.r+pu.r){ activatePowerup(pu.type); return false; }
    return pu.x>-50;
  });

  // ── WIND FORCE ON BIRD ─────────────────────────────
  if(windActive) bird.vy += windForce*(dt/16)*60;

  // ── BIRD PHYSICS ───────────────────────────────────
  bird.vy+=c.G*(dt/16);
  bird.y +=bird.vy*(dt/16);

  if(bird.y-bird.r<0){ bird.y=bird.r; bird.vy=1; }
  if(bird.y+bird.r>H-c.GRH){
    if(shield){ shield=false; bird.y=H-c.GRH-bird.r; bird.vy=-2; sfxBeep(300); }
    else { doGameOver(); return; }
  }

  // ── BULLET COLLISION ───────────────────────────────
  for(const b of bullets){
    const dx = bird.x-b.x, dy = bird.y-b.y;
    if(Math.hypot(dx,dy) < bird.r*0.85 + b.r){
      if(shield){ shield=false; bullets.splice(bullets.indexOf(b),1); boom(b.x,b.y); sfxBeep(300); break; }
      doGameOver(); return;
    }
  }

  // ── PIPE COLLISION ─────────────────────────────────
  for(const p of pipes){
    const ge=p.topH+c.GAP, bx=bird.x, by=bird.y, br=bird.r*.80;
    if(bx+br>p.x&&bx-br<p.x+p.w){
      if(by-br<p.topH||by+br>ge){
        if(shield){ shield=false; sfxBeep(300); break; }
        doGameOver(); return;
      }
    }
  }

  // ── ENEMY COLLISION ────────────────────────────────
  for(const e of enemies){
    const dx = bird.x-e.x, dy = bird.y-e.y;
    if(Math.hypot(dx,dy) < bird.r*0.85 + e.r){
      if(shield){ shield=false; sfxBeep(300); break; }
      doGameOver(); return;
    }
  }

  drawGround(); drawBird(bird);
  animId=requestAnimationFrame(gameLoop);
}

// ── GAME OVER ──────────────────────────────────────────
function doGameOver(){
  STATE='dead';
  cancelAnimationFrame(animId);
  sfxDie(); vibe([50,30,120]);
  boom(bird.x,bird.y);
  document.getElementById('hud').classList.remove('show');
  setTimeout(showDeadScreen, 680);
}

function showDeadScreen(){
  const isRec = score>=best && score>0;
  document.getElementById('card').innerHTML=`
    ${isRec?'<div class="rec-badge" id="rb">🏆 Nuevo récord</div>':''}
    <span class="icon still">${score>2?'💀':'😬'}</span>
    <div class="title">${score>0?'¡Chocaste!':'Uy...'}</div>
    <div class="sub">${score>0?'Buen intento. ¿Revancha?':'¡Casi! Inténtalo de nuevo.'}</div>
    <div class="srow">
      <div class="sbox"><div class="sbox-lbl">Score</div><div class="sbox-val">${score}</div></div>
      <div class="sbox"><div class="sbox-lbl">Récord</div><div class="sbox-val acc">${best}</div></div>
    </div>
    <button class="btn" id="again-btn">Otra vez →</button>
    <button class="btn" id="home-btn">Volver al comienzo</button>
  `;
  document.getElementById('ov').classList.remove('hide');
  document.getElementById('again-btn').addEventListener('click', ()=>{ resumeAC(); startCountdown(); });
  document.getElementById('home-btn').addEventListener('click', ()=>{ STATE='start'; showStart(); });
  if(isRec) requestAnimationFrame(()=>{ const b=document.getElementById('rb'); if(b) b.classList.add('show'); });
}

// ── COUNTDOWN ──────────────────────────────────────────
function startCountdown(){
  STATE='countdown';
  document.getElementById('ov').classList.add('hide');
  document.getElementById('hud').classList.remove('show');

  score=0; pipes=[]; enemies=[]; bullets=[]; enemyTimer=0; pipeTimer=0; lastTs=0;
  powerups=[]; powerupTimer=3000;
  windForce=0; windTimer=3000; windActive=false;
  shield=false; shieldTimer=0;
  slowActive=false; slowTimer=0;
  doubleJumpReady=false; doubleJumpUsed=false;
  bird=mkBird();

  cancelAnimationFrame(animId);
  animId=requestAnimationFrame(cdLoop);

  const cdEl=document.getElementById('cd');
  const numEl=document.getElementById('cd-num');

  function pop(txt, color){
    numEl.textContent=txt;
    numEl.style.color=color||'var(--text)';
    numEl.style.fontSize='120px';
    numEl.classList.remove('pop');
    void numEl.offsetWidth;
    numEl.classList.add('pop');
  }

  cdEl.classList.add('show');
  pop('3'); sfxBeep(440); vibe(20);

  setTimeout(()=>{ pop('2'); sfxBeep(440); vibe(20); }, 900);
  setTimeout(()=>{ pop('1'); sfxBeep(440); vibe(20); }, 1800);
  setTimeout(()=>{
    numEl.style.fontSize='72px';
    pop('¡Ya!','var(--accent)');
    sfxBeep(880); vibe([30,20,60]);
  }, 2700);
  setTimeout(()=>{
    cdEl.classList.remove('show');
    numEl.style.fontSize=''; numEl.style.color='';
    beginPlay();
  }, 3350);
}

function beginPlay(){
  STATE='playing';
  cancelAnimationFrame(animId);
  lastTs=0;
  document.getElementById('live').textContent='0';
  document.getElementById('hud-best').textContent=best;
  document.getElementById('hud').classList.add('show');
  animId=requestAnimationFrame(gameLoop);
}

// ── START SCREEN ───────────────────────────────────────
function showStart(){
  document.getElementById('card').innerHTML=`
    <span class="icon">🐦</span>
    <div class="title">Flappy Bird</div>
    <div class="sub">Vuela entre los tubos.<br>No choques con nada.</div>
    <button class="btn" id="play-btn">Jugar →</button>
    <div class="char-row">
      <span class="char-lbl">Personaje</span>
      <div class="char-pills">
        <button class="charbtn${playerKey==='green'?' active':''}" data-p="green">Verde</button>
        <button class="charbtn${playerKey==='red'?' active':''}" data-p="red">Rojo</button>
        <button class="charbtn${playerKey==='blue'?' active':''}" data-p="blue">Azul</button>
        <button class="charbtn${playerKey==='pink'?' active':''}" data-p="pink">Rosa</button>
      </div>
    </div>
    <div class="speed-row">
      <span class="speed-lbl">Velocidad</span>
      <div class="speed-pills">
        <button class="spill${speedKey==='slow'?' active':''}" data-s="slow">🐢 Lento</button>
        <button class="spill${speedKey==='normal'?' active':''}" data-s="normal">🐦 Normal</button>
        <button class="spill${speedKey==='fast'?' active':''}" data-s="fast">⚡ Rápido</button>
      </div>
    </div>
  `;
  document.getElementById('play-btn').addEventListener('click',()=>{ resumeAC(); startCountdown(); });
  document.querySelectorAll('.spill').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      speedKey = btn.dataset.s;
      localStorage.setItem('fb_speed', speedKey);
      document.querySelectorAll('.spill').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
  document.querySelectorAll('.charbtn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      playerKey = btn.dataset.p;
      localStorage.setItem('fb_player', playerKey);
      BC = PLAYERS[playerKey];
      document.querySelectorAll('.charbtn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

STATE='start';
best=parseInt(localStorage.getItem('fb')||'0');
document.getElementById('hud-best').textContent=best;
showStart();
requestAnimationFrame(idleLoop);
</script>
