<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Flapsy</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --text2: rgba(240,237,232,0.45);
    --accent: #c8f135;
    --radius: 16px;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:var(--bg);
    font-family:Helvetica,Arial,sans-serif; touch-action:none; user-select:none; }
  canvas { display:block; touch-action:none; }

  /* SCORE HUD */
  #hud {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:center;
    padding-top:max(20px,env(safe-area-inset-top));
    pointer-events:none; z-index:10;
    opacity:0; transition:opacity .25s;
  }
  #hud.show { opacity:1; }
  .pill {
    background:rgba(13,13,13,.65);
    border:1px solid var(--border);
    border-radius:100px;
    padding:8px 24px 8px 18px;
    display:flex; align-items:center; gap:12px;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  }
  .pill-score { font-size:34px; font-weight:800; color:var(--text);
    letter-spacing:-1.5px; line-height:1; min-width:28px; text-align:center; }
  .pill-best { display:flex; flex-direction:column; }
  .pill-best-label { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.08em; }
  .pill-best-val { font-size:14px; font-weight:700; color:var(--accent); letter-spacing:-.3px; line-height:1; }

  /* COUNTDOWN */
  #cd {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    z-index:30; pointer-events:none; opacity:0; transition:opacity .2s;
  }
  #cd.show { opacity:1; }
  #cd-num {
    font-size:120px; font-weight:800; color:var(--text);
    letter-spacing:-4px; line-height:1;
    text-shadow:0 0 60px rgba(200,241,53,.35);
  }
  #cd-num.pop { animation:cdpop .35s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes cdpop { from{transform:scale(.35);opacity:0} to{transform:scale(1);opacity:1} }

  /* OVERLAY */
  #ov {
    position:fixed; inset:0; display:flex;
    flex-direction:column; align-items:center; justify-content:center;
    z-index:20; padding:32px; transition:opacity .3s;
  }
  #ov.hide { opacity:0; pointer-events:none; }
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:26px; padding:36px 28px 28px;
    width:100%; max-width:320px; text-align:center;
    animation:cardIn .4s cubic-bezier(.34,1.3,.64,1) forwards;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
  .icon { font-size:54px; display:block; margin-bottom:14px; animation:flt 2.8s ease-in-out infinite; }
  .icon.still { animation:none; }
  @keyframes flt { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  .title { font-size:30px; font-weight:800; color:var(--text); letter-spacing:-1px; margin-bottom:6px; }
  .sub { font-size:13px; color:var(--text2); line-height:1.55; margin-bottom:26px; }
  .srow { display:flex; gap:10px; margin-bottom:22px; }
  .sbox { flex:1; background:rgba(255,255,255,.04); border:1px solid var(--border);
    border-radius:14px; padding:14px 8px; }
  .sbox-lbl { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.1em; margin-bottom:5px; }
  .sbox-val { font-size:28px; font-weight:800; color:var(--text); letter-spacing:-1px; line-height:1; }
  .sbox-val.acc { color:var(--accent); }
  .rec-badge {
    display:inline-block; background:var(--accent); color:#0d0d0d;
    font-size:10px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
    padding:3px 10px; border-radius:100px; margin-bottom:16px;
    opacity:0; transform:scale(.7); transition:opacity .3s .35s, transform .3s .35s;
  }
  .rec-badge.show { opacity:1; transform:scale(1); }
  .btn {
    width:100%; padding:17px; background:var(--accent); color:#0d0d0d;
    border:none; border-radius:var(--radius);
    font-family:Helvetica,Arial,sans-serif; font-size:17px; font-weight:800;
    letter-spacing:-.3px; cursor:pointer;
    transition:transform .1s, opacity .1s;
    -webkit-appearance:none; appearance:none;
  }
  .btn:active { transform:scale(.96); opacity:.85; }

  /* SPEED SELECTOR */
  .speed-row { margin-top:18px; }
  .speed-lbl { display:block; font-size:10px; color:var(--text2); text-transform:uppercase;
    letter-spacing:.1em; margin-bottom:9px; }
  .speed-pills { display:flex; gap:7px; }
  .spill {
    flex:1; padding:9px 4px; background:rgba(255,255,255,.04);
    border:1px solid var(--border); border-radius:10px;
    color:var(--text2); font-family:Helvetica,Arial,sans-serif;
    font-size:12px; font-weight:700; cursor:pointer;
    transition:background .15s, color .15s, border-color .15s;
    -webkit-appearance:none; appearance:none;
  }
  .spill.active {
    background:rgba(200,241,53,.13); border-color:var(--accent);
    color:var(--accent);
  }
  .spill:active { transform:scale(.95); }

  /* PARTICLES */
  #pc { position:fixed; inset:0; pointer-events:none; z-index:15; }
</style>
</head>
<body>

<canvas id="gc"></canvas>
<canvas id="pc"></canvas>

<div id="hud">
  <div class="pill">
    <div class="pill-score" id="live">0</div>
    <div class="pill-best">
      <span class="pill-best-label">Récord</span>
      <span class="pill-best-val" id="hud-best">0</span>
    </div>
  </div>
</div>

<div id="cd"><div id="cd-num">3</div></div>

<div id="ov"><div class="card" id="card"></div></div>

<script>
// ── AUDIO ──────────────────────────────────────────────
let AC;
try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
const resumeAC = () => { try{ if(AC&&AC.state==='suspended') AC.resume(); }catch(e){} };

function tone(freq, type, dur, vol, delay=0) {
  if(!AC) return;
  try {
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type;
    const t=AC.currentTime+delay;
    o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur);
  } catch(e){}
}
const sfxFlap  = () => { tone(400,'sine',.1,.13); tone(560,'sine',.06,.07); };
const sfxPoint = () => { tone(620,'triangle',.13,.18); tone(940,'triangle',.13,.15,.09); };
const sfxDie   = () => { tone(280,'sawtooth',.38,.22); };
const sfxBeep  = (f) => { tone(f,'sine',.15,.18); };
const vibe     = (p) => { try{ navigator.vibrate && navigator.vibrate(p); }catch(e){} };

// ── PARTICLES ──────────────────────────────────────────
const pcEl  = document.getElementById('pc');
const pctx  = pcEl.getContext('2d');
const EMOJ  = ['💥','✨','⭐','🔥','💫'];
let parts=[], praf=null;

function boom(x,y) {
  for(let i=0;i<14;i++){
    const a=(Math.PI*2/14)*i+(Math.random()-.5)*.6, s=2.5+Math.random()*5;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      e:EMOJ[~~(Math.random()*EMOJ.length)],
      sz:14+Math.random()*14,life:1,dec:.026+Math.random()*.02});
  }
  if(!praf) tickParts();
}
function tickParts(){
  pctx.clearRect(0,0,W,H);
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.18; p.life-=p.dec;
    pctx.save(); pctx.globalAlpha=Math.max(0,p.life);
    pctx.font=`${p.sz}px serif`; pctx.textAlign='center'; pctx.textBaseline='middle';
    pctx.fillText(p.e,p.x,p.y); pctx.restore();
  });
  praf=parts.length?requestAnimationFrame(tickParts):null;
  if(!parts.length) pctx.clearRect(0,0,W,H);
}

// ── CANVAS ─────────────────────────────────────────────
const gc  = document.getElementById('gc');
const ctx = gc.getContext('2d');
let W,H,DPR;

function resize(){
  DPR=window.devicePixelRatio||1;
  W=window.innerWidth; H=window.innerHeight;
  gc.width=W*DPR; gc.height=H*DPR; gc.style.width=W+'px'; gc.style.height=H+'px';
  ctx.setTransform(1,0,0,1,0,0); ctx.scale(DPR,DPR);
  pcEl.width=W*DPR; pcEl.height=H*DPR; pcEl.style.width=W+'px'; pcEl.style.height=H+'px';
  pctx.setTransform(1,0,0,1,0,0); pctx.scale(DPR,DPR);
}
window.addEventListener('resize', resize);
resize();

// ── GAME CONSTANTS ─────────────────────────────────────
const BC = { hex:'#c8f135', border:'#7aaa00' };

function GC(){
  const base=Math.min(W,H);
  return {
    G:    H*.0026,
    FLAP: -H*.027,
    BR:   base*.038,
    PW:   Math.max(52,base*.13),
    GAP:  H*.265,
    SPD:  W*.0028 * (SPEEDS[speedKey]||1),
    PINT: 1700,
    GRH:  Math.max(48,H*.075),
  };
}

// ── STATE ──────────────────────────────────────────────
// 'start' | 'countdown' | 'playing' | 'dead'
let STATE='start';
let bird,pipes,score,best,animId,lastTs,pipeTimer,cdTimeout;

best = parseInt(localStorage.getItem('fb')||'0');
document.getElementById('hud-best').textContent=best;

// ── SPEED ──────────────────────────────────────────────
const SPEEDS = { slow: 0.65, normal: 1, fast: 1.55 };
let speedKey = localStorage.getItem('fb_speed') || 'normal';

function mkBird(){ const c=GC(); return {x:W*.28,y:H*.44,vy:0,r:c.BR,angle:0}; }
function mkPipe(x){ const c=GC(),mn=H*.14,mx=H-c.GRH-c.GAP-H*.14;
  return {x,topH:mn+Math.random()*(mx-mn),w:c.PW,scored:false,glow:0}; }

// ── INPUT: only active during 'playing' ────────────────
function doFlap(){
  if(STATE!=='playing') return;
  resumeAC();
  bird.vy = GC().FLAP;
  sfxFlap(); vibe(12);
}

document.addEventListener('keydown', e=>{ if(e.code==='Space') doFlap(); });

// Single touchstart listener — only flaps when playing
document.addEventListener('touchstart', e=>{
  // Only flap if NOT a button/link — let those handle their own events
  const tag = e.target.tagName.toLowerCase();
  if(tag==='button'||tag==='a') return;
  // Prevent default only for canvas/game taps (stop scroll/zoom)
  e.preventDefault();
  doFlap();
}, { passive:false });

// Ensure buttons work reliably on mobile via touchend
document.addEventListener('touchend', e=>{
  const tag = e.target.tagName.toLowerCase();
  if(tag==='button') { e.preventDefault(); e.target.click(); }
}, { passive:false });

gc.addEventListener('mousedown', doFlap);

// ── DRAW ───────────────────────────────────────────────
function drawBg(){
  ctx.strokeStyle='rgba(255,255,255,.016)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=44){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<H;y+=44){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
}

function drawGround(){
  const c=GC(), gY=H-c.GRH;
  ctx.fillStyle='#161616'; ctx.fillRect(0,gY,W,c.GRH);
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,gY); ctx.lineTo(W,gY); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.032)';
  for(let x=0;x<W;x+=22){ ctx.beginPath();ctx.moveTo(x,gY);ctx.lineTo(x,gY+6);ctx.stroke(); }
}

function drawBird(b){
  ctx.save(); ctx.translate(b.x,b.y);
  const tgt=Math.min(Math.max((b.vy||0)*.06,-.45),1.1);
  b.angle=(b.angle||0)+(tgt-(b.angle||0))*.18;
  ctx.rotate(b.angle);
  ctx.shadowColor=BC.hex; ctx.shadowBlur=16;
  ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fillStyle=BC.hex; ctx.fill();
  ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2);
  ctx.strokeStyle=BC.border; ctx.lineWidth=2.5; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-b.r*.15,b.r*.22,b.r*.42,b.r*.21,-.3,0,Math.PI*2);
  ctx.fillStyle=BC.border; ctx.fill();
  const ex=b.r*.38,ey=-b.r*.2;
  ctx.beginPath(); ctx.arc(ex,ey,b.r*.18,0,Math.PI*2); ctx.fillStyle='#0d0d0d'; ctx.fill();
  ctx.beginPath(); ctx.arc(ex+b.r*.06,ey-b.r*.06,b.r*.07,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fill();
  ctx.restore();
}

function rrect(x,y,w,h,tl,tr,br,bl){
  ctx.beginPath();
  ctx.moveTo(x+tl,y); ctx.lineTo(x+w-tr,y); ctx.quadraticCurveTo(x+w,y,x+w,y+tr);
  ctx.lineTo(x+w,y+h-br); ctx.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
  ctx.lineTo(x+bl,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-bl);
  ctx.lineTo(x,y+tl); ctx.quadraticCurveTo(x,y,x+tl,y); ctx.closePath();
}

function drawPipe(p){
  const c=GC(),r=10,ge=p.topH+c.GAP;
  if(p.glow>0){ ctx.shadowColor=BC.hex; ctx.shadowBlur=22*p.glow; }
  ctx.fillStyle='#1c1c1c'; ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=1.5;
  rrect(p.x,0,p.w,p.topH-r,0,0,r,r); ctx.fill(); ctx.stroke();
  rrect(p.x,ge+r,p.w,H-ge-r-c.GRH,r,r,0,0); ctx.fill(); ctx.stroke();
  ctx.shadowBlur=0;
  const cx=p.x-5,cw=p.w+10;
  ctx.fillStyle='#222'; ctx.strokeStyle='rgba(255,255,255,.11)';
  rrect(cx,p.topH-18,cw,18,0,0,6,6); ctx.fill(); ctx.stroke();
  rrect(cx,ge,cw,18,6,6,0,0); ctx.fill(); ctx.stroke();
  ctx.setLineDash([4,9]);
  ctx.strokeStyle=p.glow>0?`rgba(200,241,53,${.2*p.glow})`:'rgba(255,255,255,.022)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(p.x+p.w/2,p.topH+5); ctx.lineTo(p.x+p.w/2,ge-5); ctx.stroke();
  ctx.setLineDash([]);
  if(p.glow>0) p.glow=Math.max(0,p.glow-.055);
}

// ── IDLE LOOP ──────────────────────────────────────────
function idleLoop(ts){
  if(STATE!=='start') return;
  ctx.clearRect(0,0,W,H); drawBg();
  const fb={x:W*.28,y:H*.43+Math.sin(ts/600)*11,vy:Math.sin(ts/600)*2.5,angle:0,r:GC().BR};
  drawGround(); drawBird(fb);
  requestAnimationFrame(idleLoop);
}

// ── COUNTDOWN LOOP ─────────────────────────────────────
function cdLoop(ts){
  if(STATE!=='countdown'&&STATE!=='playing') return;
  ctx.clearRect(0,0,W,H); drawBg();
  // Float bird while counting
  if(STATE==='countdown'){
    bird.y=H*.43+Math.sin(ts/600)*11;
    bird.vy=Math.sin(ts/600)*2.5;
  }
  drawGround(); drawBird(bird);
  if(STATE==='countdown') animId=requestAnimationFrame(cdLoop);
}

// ── GAME LOOP ──────────────────────────────────────────
function gameLoop(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min(ts-lastTs,50); lastTs=ts;
  const c=GC();

  ctx.clearRect(0,0,W,H); drawBg();

  pipeTimer+=dt;
  if(pipeTimer>=c.PINT){ pipes.push(mkPipe(W+c.PW)); pipeTimer=0; }

  pipes.forEach(p=>{
    p.x-=c.SPD*(dt/16);
    if(!p.scored&&p.x+p.w<bird.x){
      p.scored=true; p.glow=1; score++;
      sfxPoint(); vibe(25);
      document.getElementById('live').textContent=score;
      if(score>best){ best=score; localStorage.setItem('fb',best);
        document.getElementById('hud-best').textContent=best; }
    }
    drawPipe(p);
  });
  pipes=pipes.filter(p=>p.x+p.w>-20);

  bird.vy+=c.G*(dt/16);
  bird.y +=bird.vy*(dt/16);

  if(bird.y-bird.r<0){ bird.y=bird.r; bird.vy=1; }
  if(bird.y+bird.r>H-c.GRH){ doGameOver(); return; }

  for(const p of pipes){
    const ge=p.topH+c.GAP, bx=bird.x, by=bird.y, br=bird.r*.80;
    if(bx+br>p.x&&bx-br<p.x+p.w){
      if(by-br<p.topH||by+br>ge){ doGameOver(); return; }
    }
  }

  drawGround(); drawBird(bird);
  animId=requestAnimationFrame(gameLoop);
}

// ── GAME OVER ──────────────────────────────────────────
function doGameOver(){
  STATE='dead';
  cancelAnimationFrame(animId);
  sfxDie(); vibe([50,30,120]);
  boom(bird.x,bird.y);
  document.getElementById('hud').classList.remove('show');
  setTimeout(showDeadScreen, 680);
}

function showDeadScreen(){
  const isRec = score>=best && score>0;
  document.getElementById('card').innerHTML=`
    ${isRec?'<div class="rec-badge" id="rb">🏆 Nuevo récord</div>':''}
    <span class="icon still">${score>2?'💀':'😬'}</span>
    <div class="title">${score>0?'¡Chocaste!':'Uy...'}</div>
    <div class="sub">${score>0?'Buen intento. ¿Revancha?':'¡Casi! Inténtalo de nuevo.'}</div>
    <div class="srow">
      <div class="sbox"><div class="sbox-lbl">Score</div><div class="sbox-val">${score}</div></div>
      <div class="sbox"><div class="sbox-lbl">Récord</div><div class="sbox-val acc">${best}</div></div>
    </div>
    <button class="btn" id="again-btn">Otra vez →</button>
  `;
  document.getElementById('ov').classList.remove('hide');
  document.getElementById('again-btn').addEventListener('click', ()=>{ resumeAC(); startCountdown(); });
  if(isRec) requestAnimationFrame(()=>{ const b=document.getElementById('rb'); if(b) b.classList.add('show'); });
}

// ── COUNTDOWN ──────────────────────────────────────────
function startCountdown(){
  STATE='countdown';
  document.getElementById('ov').classList.add('hide');
  document.getElementById('hud').classList.remove('show');

  score=0; pipes=[]; pipeTimer=0; lastTs=0;
  bird=mkBird();

  cancelAnimationFrame(animId);
  animId=requestAnimationFrame(cdLoop);

  const cdEl=document.getElementById('cd');
  const numEl=document.getElementById('cd-num');

  function pop(txt, color){
    numEl.textContent=txt;
    numEl.style.color=color||'var(--text)';
    numEl.style.fontSize='120px';
    numEl.classList.remove('pop');
    void numEl.offsetWidth;
    numEl.classList.add('pop');
  }

  cdEl.classList.add('show');
  pop('3'); sfxBeep(440); vibe(20);

  setTimeout(()=>{ pop('2'); sfxBeep(440); vibe(20); }, 900);
  setTimeout(()=>{ pop('1'); sfxBeep(440); vibe(20); }, 1800);
  setTimeout(()=>{
    numEl.style.fontSize='72px';
    pop('¡Ya!','var(--accent)');
    sfxBeep(880); vibe([30,20,60]);
  }, 2700);
  setTimeout(()=>{
    cdEl.classList.remove('show');
    numEl.style.fontSize=''; numEl.style.color='';
    beginPlay();
  }, 3350);
}

function beginPlay(){
  STATE='playing';
  cancelAnimationFrame(animId);
  lastTs=0;
  document.getElementById('live').textContent='0';
  document.getElementById('hud-best').textContent=best;
  document.getElementById('hud').classList.add('show');
  animId=requestAnimationFrame(gameLoop);
}

// ── START SCREEN ───────────────────────────────────────
function showStart(){
  document.getElementById('card').innerHTML=`
    <span class="icon">🐦</span>
    <div class="title">Flapsy</div>
    <div class="sub">Vuela entre los tubos.<br>No choques con nada.</div>
    <button class="btn" id="play-btn">Jugar →</button>
    <div class="speed-row">
      <span class="speed-lbl">Velocidad</span>
      <div class="speed-pills">
        <button class="spill${speedKey==='slow'?' active':''}" data-s="slow">🐢 Lento</button>
        <button class="spill${speedKey==='normal'?' active':''}" data-s="normal">🐦 Normal</button>
        <button class="spill${speedKey==='fast'?' active':''}" data-s="fast">⚡ Rápido</button>
      </div>
    </div>
  `;
  document.getElementById('play-btn').addEventListener('click',()=>{ resumeAC(); startCountdown(); });
  document.querySelectorAll('.spill').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      speedKey = btn.dataset.s;
      localStorage.setItem('fb_speed', speedKey);
      document.querySelectorAll('.spill').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

STATE='start';
best=parseInt(localStorage.getItem('fb')||'0');
document.getElementById('hud-best').textContent=best;
showStart();
requestAnimationFrame(idleLoop);
</script>
</body>
</html>
